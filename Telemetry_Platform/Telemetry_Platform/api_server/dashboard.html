<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realtime Telemetry Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { height: 100dvh; background-color: #0b0e14; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        .tab-btn { border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { border-bottom: 2px solid #2962FF; color: #ffffff; background-color: #1e222d; }
        .chart-box { width: 100%; position: relative; }
        .chart-box > div:not([id^="combined-heatmap"]):not([id^="combined-vol-profile"]):not(.qtp-watermark) { position: absolute !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; width: 100% !important; height: 100% !important; }

        .qtp-watermark {
            position: absolute; bottom: 15px; right: 15px;
            font-family: 'Trebuchet MS', sans-serif; font-size: 100px; font-weight: bold;
            color: #ffffff; opacity: 0.06; pointer-events: none; user-select: none; z-index: 40;
       }
        .neon-text { text-shadow: 0 0 10px rgba(41, 98, 255, 0.4); }
        .tape-row { animation: slideIn 0.2s ease-out; border-left: 2px solid transparent; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .asset-container { display: none; width: 100%; animation: fadeIn 0.3s ease-in-out; }
        .asset-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 2px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 32px; }
        @media (min-width: 1024px) { .metrics-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px; } }

        .hero-panel { display: flex; flex-direction: column; gap: 15px; margin-bottom: 32px; padding: 24px; background: #131722; border: 1px solid #2a2e39; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .hero-panel > div { width: 100%; border-top: 1px solid #2a2e39; padding-top: 12px; }
        .hero-panel > div:first-child { border-top: none; padding-top: 0; }
        @media (min-width: 640px) {
            .hero-panel { flex-direction: row; align-items: center; justify-content: space-between; gap: 0; }
            .hero-panel > div { width: 25%; border-top: none; padding-top: 0; text-align: center; border-left: 1px solid #2a2e39; }
            .hero-panel > div:first-child { text-align: left; border-left: none; }
            .hero-panel > div:last-child { text-align: right; }
        }

        .layout-wrapper { flex: 1; min-height: 0; display: flex; flex-direction: column; position: relative; }
        .layout-charts { flex: 1; overflow-y: auto; background: #0b0e14; transition: width 0.3s ease; -webkit-overflow-scrolling: touch; }
        .layout-tape { height: 40%; display: flex; flex-direction: column; background: #131722; transition: all 0.3s ease; flex-shrink: 0; }
        .layout-tape.collapsed { height: 0; border: none; overflow: hidden; }

        .tape-toggle-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 44px; background: #1e222d; cursor: pointer;
            border-top: 1px solid #2a2e39; border-bottom: 1px solid #2a2e39;
            transition: background 0.2s, color 0.2s; color: #787b86; z-index: 50; flex-shrink: 0;
        }
        .tape-toggle-btn:hover { background: #2962FF; color: white; }
        
        #tape-arrow { transition: transform 0.3s ease; transform: rotate(90deg); width: 24px; height: 24px; }
        .tape-collapsed #tape-arrow { transform: rotate(-90deg); }

        body.fullscreen-active header,
        body.fullscreen-active > div.z-50.relative,
        body.fullscreen-active #tape-toggle,
        body.fullscreen-active #tape-area { display: none !important; }
        
        body.fullscreen-active .layout-charts { padding: 0 !important; overflow: hidden !important; }

        .fullscreen-mode {
            position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
            z-index: 999999 !important; background-color: #0b0e14 !important; padding: 12px !important; margin: 0 !important;
            border-radius: 0 !important; border: none !important; box-shadow: none !important; display: flex !important;
            flex-direction: column !important; width: 100vw !important; height: 100dvh !important; max-width: 100vw !important; max-height: 100dvh !important; box-sizing: border-box !important;
        }
        @media (min-width: 640px) { .fullscreen-mode { padding: 32px !important; } }
        
        .fullscreen-mode > div:first-child { flex: 0 0 auto !important; margin-bottom: 12px !important; width: 100% !important; max-width: 100% !important; }
        .fullscreen-mode .chart-box { flex: 1 1 0px !important; height: 100% !important; width: 100% !important; min-height: 0 !important; min-width: 0 !important; }

        @media (min-width: 1024px) {
            .layout-wrapper { flex-direction: row; }
            .layout-charts { height: 100%; width: 75%; }
            .layout-charts.expanded { width: 100%; }
            .layout-tape { height: 100%; width: 25%; border-top: none; border-left: 1px solid #2a2e39; }
            .layout-tape.collapsed { width: 0; border: none; overflow: hidden; }
            .tape-toggle-btn { width: 24px; height: 100%; border-left: 1px solid #2a2e39; border-right: 1px solid #2a2e39; border-top: none; border-bottom: none; }
            #tape-arrow { transform: rotate(0deg); width: 18px; height: 18px; }
            .tape-collapsed #tape-arrow { transform: rotate(180deg); }
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="absolute inset-0 z-[100] flex items-center justify-center bg-[#0b0e14] p-4">
        <div class="bg-[#131722] border border-[#2a2e39] p-8 rounded-xl w-full max-w-md text-center shadow-2xl">
            <h1 class="text-3xl font-bold text-white tracking-widest neon-text mb-6">Quantum Terminal Pro</h1>
            <input type="text" id="api-key-input" placeholder="Enter License Key..." class="w-full bg-[#1e222d] border border-[#2a2e39] text-white px-4 py-3 rounded-lg mb-4 text-center font-mono outline-none focus:border-[#2962FF]">
            <button onclick="startTerminal()" class="w-full bg-[#2962FF] hover:bg-blue-600 text-white font-bold py-3 rounded-lg uppercase tracking-wider transition-colors">Connect</button>
        </div>
    </div>

    <header class="bg-[#131722] border-b border-[#2a2e39] p-3 flex justify-between items-center text-xs shrink-0 z-50 relative">
        <h1 class="font-bold text-white tracking-widest neon-text">Quantum Terminal Pro</h1>
        <div class="flex items-center gap-3">
            <div id="sub-badge" class="hidden items-center bg-[#1e222d] border border-[#2a2e39] px-2 py-1 rounded text-[10px] font-bold tracking-wider">
                <span id="sub-icon" class="mr-1"></span>
                <span id="sub-label" class="text-white"></span>
            </div>
    
            <div class="flex items-center gap-2 border-l border-[#2a2e39] pl-3">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-rose-500"></span>
                <span id="status-text" class="font-bold text-rose-500 uppercase tracking-wider hidden sm:inline">OFFLINE</span>
            </div>
        </div>
    </header>

    <div class="flex bg-[#131722] border-b border-[#2a2e39] px-2 sm:px-4 shrink-0 overflow-x-auto z-50 relative">
        <button onclick="switchTab('BTC')" id="tab-BTC" class="tab-btn active px-4 sm:px-6 py-3 text-xs font-bold text-[#787b86] uppercase whitespace-nowrap">Bitcoin</button>
        <button onclick="switchTab('ETH')" id="tab-ETH" class="tab-btn px-4 sm:px-6 py-3 text-xs font-bold text-[#787b86] uppercase whitespace-nowrap">Ethereum</button>
    </div>

    <main class="layout-wrapper">
        <div id="main-charts-area" class="layout-charts relative p-4 sm:p-6 lg:p-10">
            <div id="BTC-container" class="asset-container active"></div>
            <div id="ETH-container" class="asset-container"></div>
        </div>

        <div id="tape-toggle" class="tape-toggle-btn" onclick="toggleTape()">
            <svg id="tape-arrow" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </div>

        <div id="tape-area" class="layout-tape font-mono text-[11px]">
            <div class="p-2 sm:p-3 border-b border-[#2a2e39] bg-[#1e222d] font-bold text-white uppercase flex justify-between items-center shrink-0">
                <span>Whale Tape</span>
                <div class="flex gap-1">
                    <button onclick="setTapeFilter(100000)" id="btn-filter-100k" class="px-2 py-1 text-[9px] bg-[#2962FF] text-white rounded transition-colors"> > 100k</button>
                    <button onclick="setTapeFilter(500000)" id="btn-filter-500k" class="px-2 py-1 text-[9px] bg-[#131722] text-[#787b86] rounded border border-[#2a2e39] transition-colors"> > 500k</button>
                    <button onclick="setTapeFilter(1000000)" id="btn-filter-1m" class="px-2 py-1 text-[9px] bg-[#131722] text-[#787b86] rounded border border-[#2a2e39] transition-colors"> > 1M</button>
                </div>
            </div>
            <div id="live-tape" class="flex-grow overflow-y-auto p-1 sm:p-2 flex flex-col gap-1"></div>
        </div>
    </main>

    <script>
        let tapeVisible = true;
        let wallsVisible = { BTC: false, ETH: false }; 
        let lineMode = { BTC: false, ETH: false };
        let activeWhales = { BTC: {}, ETH: {} };
        let activeLiqMode = { BTC: 'GROSS', ETH: 'GROSS' }; 

        function toggleFitContent(asset, chartName) {
            const chart = chartsData[asset][chartName];
            if (!chart) return;
            if (!chartsData[asset].zoomStates) chartsData[asset].zoomStates = {};
            if (!chartsData[asset].zoomStates[chartName]) {
                chartsData[asset].zoomStates[chartName] = chart.timeScale().getVisibleLogicalRange();
                chart.timeScale().fitContent();
            } else {
                chart.timeScale().setVisibleLogicalRange(chartsData[asset].zoomStates[chartName]);
                chartsData[asset].zoomStates[chartName] = null;
            }
        }

        function toggleFullscreen(wrapperId) {
            const wrapper = document.getElementById(wrapperId);
            if(wrapper) {
                wrapper.style.transition = 'none';
                const isExiting = wrapper.classList.contains('fullscreen-mode');
                
                if (isExiting) {
                    wrapper.classList.remove('fullscreen-mode');
                    document.body.classList.remove('fullscreen-active');
                } else {
                    wrapper.classList.add('fullscreen-mode');
                    document.body.classList.add('fullscreen-active');
                }
                
                setTimeout(() => { 
                    window.dispatchEvent(new Event('resize')); 
                    setTimeout(() => { wrapper.style.transition = ''; }, 50);
                }, 10);
            }
        }

        function getFitBtn(asset, chartName) {
            return `<button onclick="toggleFitContent('${asset}', '${chartName}')" class="text-[#787b86] hover:text-[#2962FF] transition-colors ml-2" title="Toggle Fit to Screen"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 sm:h-4 sm:w-4 inline-block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg></button>`;
        }

        function getExpandBtn(wrapperId) {
            return '';
        }

        function toggleTape() {
            tapeVisible = !tapeVisible;
            const tapeArea = document.getElementById('tape-area');
            const chartsArea = document.getElementById('main-charts-area');
            const arrow = document.getElementById('tape-arrow');
            
            if (!tapeVisible) { tapeArea.classList.add('collapsed'); chartsArea.classList.add('expanded'); arrow.classList.add('rotate-180'); } 
            else { tapeArea.classList.remove('collapsed'); chartsArea.classList.remove('expanded'); arrow.classList.remove('rotate-180'); }
            setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
        }

        function toggleWalls(asset) {
            wallsVisible[asset] = !wallsVisible[asset];
            const btn = document.getElementById(`btn-toggle-walls-${asset}`);
            if (btn) {
                if (wallsVisible[asset]) {
                    btn.className = "px-2 py-1 text-[9px] font-bold text-white bg-[#f23645] rounded transition-colors shadow-[0_0_5px_#f23645]";
                    btn.textContent = "ORDERS: ON";
                } else {
                    btn.className = "px-2 py-1 text-[9px] font-bold text-[#787b86] bg-[#2a2e39] rounded transition-colors";
                    btn.textContent = "ORDERS: OFF";
                }
            }
            if (chartsData[asset] && chartsData[asset].whaleLines && !lineMode[asset]) {
                Object.keys(chartsData[asset].whaleLines).forEach(key => {
                    let lineObj = chartsData[asset].whaleLines[key];
                    if (lineObj && activeWhales[asset] && activeWhales[asset][key]) {
                        let data = activeWhales[asset][key];
                        lineObj.applyOptions({ color: wallsVisible[asset] ? data.color : 'rgba(0,0,0,0)', title: wallsVisible[asset] ? data.title : '' });
                    }
                });
            }
        }

        function toggleLineMode(asset) {
            lineMode[asset] = !lineMode[asset];
            const btn = document.getElementById(`btn-toggle-line-${asset}`);
            if (lineMode[asset]) {
                btn.textContent = "MODE: LINE";
                btn.className = "px-2 py-1 text-[9px] font-bold text-white bg-[#2962FF] rounded transition-colors shadow-[0_0_5px_#2962FF]";
                chartsData[asset].candleSeries.applyOptions({ visible: false });
                chartsData[asset].emaSeries['50'].applyOptions({ visible: false });
                chartsData[asset].emaSeries['200'].applyOptions({ visible: false });
                chartsData[asset].emaSeries['800'].applyOptions({ visible: false });
                chartsData[asset].simpleLineSeries.applyOptions({ visible: true });
                Object.values(chartsData[asset].whaleLines).forEach(l => { if(l) l.applyOptions({color: 'rgba(0,0,0,0)', title: ''}); });
            } else {
                btn.textContent = "MODE: CANDLES";
                btn.className = "px-2 py-1 text-[9px] font-bold text-[#787b86] bg-[#2a2e39] rounded transition-colors";
                chartsData[asset].candleSeries.applyOptions({ visible: true });
                
                const p = activeEmaPeriod;
                chartsData[asset].emaSeries['50'].applyOptions({ visible: p === '50' || p === 'ALL' });
                chartsData[asset].emaSeries['200'].applyOptions({ visible: p === '200' || p === 'ALL' });
                chartsData[asset].emaSeries['800'].applyOptions({ visible: p === '800' || p === 'ALL' });
                chartsData[asset].simpleLineSeries.applyOptions({ visible: false });
                
                if(wallsVisible[asset]) {
                    Object.keys(chartsData[asset].whaleLines).forEach(key => {
                        let lineObj = chartsData[asset].whaleLines[key];
                        if(lineObj && activeWhales[asset][key]) {
                            let data = activeWhales[asset][key];
                            lineObj.applyOptions({color: data.color, title: data.title});
                        }
                    });
                }
            }
        }

        
        function toggleLiqMode(asset, mode) {
            activeLiqMode[asset] = mode;
            document.getElementById(`btn-liq-GROSS-${asset}`).className = mode === 'GROSS' ? "px-2 py-0.5 text-[9px] font-bold text-[#f8a13f] bg-[#2a2e39] rounded shadow-[0_0_5px_#f8a13f]" : "px-2 py-0.5 text-[9px] font-bold text-[#787b86] rounded";
            document.getElementById(`btn-liq-NET-${asset}`).className = mode === 'NET' ? "px-2 py-0.5 text-[9px] font-bold text-[#f8a13f] bg-[#2a2e39] rounded shadow-[0_0_5px_#f8a13f]" : "px-2 py-0.5 text-[9px] font-bold text-[#787b86] rounded";

            if (chartsData[asset] && chartsData[asset].grossShortSeries) {
                chartsData[asset].grossShortSeries.applyOptions({ visible: mode === 'GROSS' });
                chartsData[asset].grossLongSeries.applyOptions({ visible: mode === 'GROSS' });
                chartsData[asset].netLiqSeries.applyOptions({ visible: mode === 'NET' });
            }
        }

        const formatMoney = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(v);
        const formatCompact = (v) => {
            if (v === undefined || v === null) return "0";
            const absVal = Math.abs(v);
            const sign = v < 0 ? "-" : "";
            if (absVal >= 1.0e+9) return sign + (absVal / 1.0e+9).toFixed(2) + "B";
            else if (absVal >= 1.0e+6) return sign + (absVal / 1.0e+6).toFixed(1) + "M";
            else if (absVal >= 1.0e+3) return sign + (absVal / 1.0e+3).toFixed(1) + "K";
            return sign + absVal.toFixed(0);
        };
        const host = window.location.host;
        const WS_URL = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${host}/ws/market_data`;
        const API_URL = `${window.location.protocol === 'https:' ? 'https' : 'http'}://${host}/api/history/`;

        const chartsData = { BTC: {}, ETH: {} };
        let lastChartTime = { BTC: 0, ETH: 0 };
        const lastWsCVD = { BTC: null, ETH: null };
        let activeWS = null;
        let reconnectTimeout = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 12;
        let currentAsset = 'BTC';
        const EXCHANGES = ['GLOBAL', 'BINANCE', 'BYBIT', 'OKX', 'HYPERLIQUID', 'DYDX', 'BITGET', 'DERIBIT', 'HTX', 'GATE'];
        
        let activeEmaPeriod = '800'; 
        let activeGlobalExchange = 'GLOBAL';
        let activeCVDSession = '24H';
        let activeVolMode = 'TOTAL';

        function setEmaPeriod(period) {
            activeEmaPeriod = period;
            ['BTC', 'ETH'].forEach(asset => {
                ['50', '200', '800', 'ALL'].forEach(p => {
                    const btn = document.getElementById(`btn-ema-${p}-${asset}`);
                    if (btn) btn.className = p === period ? "ema-btn px-2 py-0.5 text-[9px] font-bold text-[#f8a13f] bg-[#2a2e39] rounded transition-colors" : "ema-btn px-2 py-0.5 text-[9px] font-bold text-[#787b86] rounded transition-colors";
                });
                if (chartsData[asset] && chartsData[asset].emaSeries && !lineMode[asset]) {
                    chartsData[asset].emaSeries['50'].applyOptions({ visible: period === '50' || period === 'ALL' });
                    chartsData[asset].emaSeries['200'].applyOptions({ visible: period === '200' || period === 'ALL' });
                    chartsData[asset].emaSeries['800'].applyOptions({ visible: period === '800' || period === 'ALL' });
                }
            });
        }

        function setGlobalExchange(ex) {
            activeGlobalExchange = ex;
            ['BTC', 'ETH'].forEach(asset => {
                EXCHANGES.forEach(e => {
                    const btn = document.getElementById(`btn-global-${e}-${asset}`);
                    if (btn) btn.className = e === ex ? `px-4 py-2 text-[10px] font-bold text-[#f8a13f] bg-[#2a2e39] rounded whitespace-nowrap shadow-md` : `px-4 py-2 text-[10px] font-bold text-[#787b86] hover:bg-[#1e222d] rounded whitespace-nowrap transition-colors`;
                });

                if (chartsData[asset]) {
                    if (chartsData[asset].allOI && chartsData[asset].allOI[ex]) chartsData[asset].oiSeries.setData(chartsData[asset].allOI[ex]);
                    if (chartsData[asset].allOIDelta && chartsData[asset].allOIDelta[ex]) chartsData[asset].oiDeltaSeries.setData(chartsData[asset].allOIDelta[ex]);
                    if (chartsData[asset].allFund && chartsData[asset].allFund[ex]) chartsData[asset].fundSeries.setData(chartsData[asset].allFund[ex]);
                    if (chartsData[asset].allCVD && chartsData[asset].allCVD[ex]) chartsData[asset].cvdSeries.setData(chartsData[asset].allCVD[ex][activeCVDSession] || chartsData[asset].allCVD[ex]['24H']);
                    if (chartsData[asset].allVol && chartsData[asset].allVol[ex]) chartsData[asset].volSeries.setData(chartsData[asset].allVol[ex][activeCVDSession][activeVolMode] || chartsData[asset].allVol[ex]['24H']['TOTAL']);
                    if (chartsData[asset].allDiv && chartsData[asset].allDiv[ex]) chartsData[asset].divSeries.setData(chartsData[asset].allDiv[ex][activeCVDSession] || chartsData[asset].allDiv[ex]['24H']);
                }
            });
        }

        function setCVDSession(ses) {
            activeCVDSession = ses;
            ['BTC', 'ETH'].forEach(asset => {
                ['24H', 'ASIA', 'EU', 'US'].forEach(s => {
                    const btn = document.getElementById(`btn-cvdses-${s}-${asset}`);
                    if (btn) btn.className = s === ses ? `px-3 py-1.5 text-[9px] font-bold text-[#f8a13f] bg-[#2a2e39] rounded whitespace-nowrap` : `px-3 py-1.5 text-[9px] font-bold text-[#787b86] rounded whitespace-nowrap`;
                });
                
                if (chartsData[asset] && chartsData[asset].allCVD && chartsData[asset].allCVD[activeGlobalExchange]) {
                    chartsData[asset].cvdSeries.setData(chartsData[asset].allCVD[activeGlobalExchange][ses] || chartsData[asset].allCVD[activeGlobalExchange]['24H']);
                    if (chartsData[asset].allVol && chartsData[asset].allVol[activeGlobalExchange][ses]) chartsData[asset].volSeries.setData(chartsData[asset].allVol[activeGlobalExchange][ses][activeVolMode]);
                    if (chartsData[asset].allDiv && chartsData[asset].allDiv[activeGlobalExchange][ses]) chartsData[asset].divSeries.setData(chartsData[asset].allDiv[activeGlobalExchange][ses]);
                }
            });
        }

        function setVolMode(mode) {
            activeVolMode = mode;
            ['BTC', 'ETH'].forEach(asset => {
                ['TOTAL', 'DELTA'].forEach(m => {
                    const btn = document.getElementById(`btn-volmode-${m}-${asset}`);
                    if (btn) btn.className = m === mode ? `px-3 py-1.5 text-[9px] font-bold text-[#f8a13f] bg-[#2a2e39] rounded whitespace-nowrap` : `px-3 py-1.5 text-[9px] font-bold text-[#787b86] rounded whitespace-nowrap`;
                });
                if (chartsData[asset] && chartsData[asset].allVol && chartsData[asset].allVol[activeGlobalExchange]) {
                    chartsData[asset].volSeries.setData(chartsData[asset].allVol[activeGlobalExchange][activeCVDSession][mode] || chartsData[asset].allVol[activeGlobalExchange]['24H']['TOTAL']);
                }
            });
        }

        let minTapeValue = 100000;
        function setTapeFilter(val) {
            minTapeValue = val;
            document.getElementById('btn-filter-100k').className = val === 100000 ? "px-2 py-1 text-[9px] bg-[#2962FF] text-white rounded" : "px-2 py-1 text-[9px] bg-[#131722] text-[#787b86] rounded border border-[#2a2e39]";
            document.getElementById('btn-filter-500k').className = val === 500000 ? "px-2 py-1 text-[9px] bg-[#2962FF] text-white rounded" : "px-2 py-1 text-[9px] bg-[#131722] text-[#787b86] rounded border border-[#2a2e39]";
            document.getElementById('btn-filter-1m').className = val === 1000000 ? "px-2 py-1 text-[9px] bg-[#2962FF] text-white rounded" : "px-2 py-1 text-[9px] bg-[#131722] text-[#787b86] rounded border border-[#2a2e39]";
            document.getElementById('live-tape').innerHTML = '';
        }

        function switchTab(asset) {
            currentAsset = asset;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.asset-container').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${asset}`).classList.add('active');
            document.getElementById(`${asset}-container`).classList.add('active');

        if (!window.volTooltipState) {

                    state.pinned = false;
                    state.priceId = null;
                    state.data = null;

        function renderVolumeProfile(asset, profileData, currentPrice) {
            const container = document.getElementById(`combined-vol-profile-${asset}`);
            if(!container) return;

            container.className = "w-full flex-1 flex min-h-0 relative bg-[#0b0e14]/50 border border-[#2a2e39] rounded shadow-inner overflow-hidden";

            const rangeMin = currentPrice * 0.95;
            const rangeMax = currentPrice * 1.05;
            
            let maxVol = 1; 
            let totalBuy = 0; 
            let totalSell = 0; 

            
            const numBins = 20; 
            const visualBinSize = (rangeMax - rangeMin) / numBins;
            const visualBins = {};

            if (profileData) {
                Object.entries(profileData).forEach(([priceStr, vols]) => {
                    const price = parseFloat(priceStr);
                    if (price >= rangeMin && price <= rangeMax) {
                        const binIdx = Math.floor((price - rangeMin) / visualBinSize);
                        if (!visualBins[binIdx]) {
                            visualBins[binIdx] = { 
                                price: rangeMin + (binIdx + 0.5) * visualBinSize, 
                                buyVol: 0, 
                                sellVol: 0, 
                                totalBinVol: 0 
                            };
                        }
                        visualBins[binIdx].buyVol += vols.buy || 0;
                        visualBins[binIdx].sellVol += vols.sell || 0;
                        visualBins[binIdx].totalBinVol += (vols.buy || 0) + (vols.sell || 0);
                        
                        totalBuy += vols.buy || 0;
                        totalSell += vols.sell || 0;
                    }
                });
            }

            const bins = Object.values(visualBins);
            bins.forEach(b => { if (b.totalBinVol > maxVol) maxVol = b.totalBinVol; });

            if (bins.length === 0) {
                container.innerHTML = '<div class="h-full w-full flex items-center justify-center"><p class="text-[10px] text-[#787b86] italic animate-pulse">Building Volume Profile...</p></div>';
                return;
            }

            let html = '';
            
            
            html += `<div id="vol-tt-${asset}" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-[#1e222d]/95 backdrop-blur-md border text-white text-[11px] p-3 rounded-lg shadow-[0_0_30px_rgba(0,0,0,0.8)] z-[100] pointer-events-none min-w-[150px] text-center transition-colors duration-200"></div>`;

            
            const currentBottomPct = ((currentPrice - rangeMin) / (rangeMax - rangeMin)) * 100;
            html += `<div class="absolute left-0 right-0 z-30 pointer-events-none" style="bottom: ${currentBottomPct}%; height: 1px; background-color: #FFD700; box-shadow: 0 0 10px #FFD700; opacity: 0.8;"></div>`;

            
            html += `
                <div class="absolute right-1 top-1 text-[9px] text-[#22ab94] font-mono bg-[#0b0e14]/80 px-1 rounded border border-[#2a2e39] z-40 pointer-events-none">${formatMoney(rangeMax)}</div>
                <div class="absolute right-1 bottom-1 text-[9px] text-[#f23645] font-mono bg-[#0b0e14]/80 px-1 rounded border border-[#2a2e39] z-40 pointer-events-none">${formatMoney(rangeMin)}</div>
                <div class="absolute right-1 text-[10px] text-[#FFD700] font-bold font-mono bg-[#0b0e14]/90 px-1 rounded border border-[#FFD700] z-40 pointer-events-none" style="bottom: ${currentBottomPct}%; transform: translateY(50%);">${formatMoney(currentPrice)}</div>
            `;

            const binPct = 100 / numBins;
            const barHeightCss = `calc(${binPct}% - 2px)`;
            
            
            const state = window.volTooltipState[asset];

            bins.forEach(bin => {
                const bottomPct = ((bin.price - rangeMin) / (rangeMax - rangeMin)) * 100;
                const bottomPos = bottomPct - (binPct / 2);
                
                const widthPct = Math.max(0.5, (bin.totalBinVol / maxVol) * 85); 
                const buyWidthPct = (bin.buyVol / bin.totalBinVol) * 100;
                const sellWidthPct = (bin.sellVol / bin.totalBinVol) * 100;
                const isPoc = bin.totalBinVol === maxVol;
                
                const priceStr = formatMoney(bin.price);
                const buyStr = formatCompact(bin.buyVol);
                const sellStr = formatCompact(bin.sellVol);
                const totalStr = formatCompact(bin.totalBinVol);

                
                if (state.priceId === bin.price) {
                    state.data = { isPoc, priceStr, buyStr, sellStr, totalStr };
                }
                
                const pocStyle = isPoc ? 'shadow-[0_0_15px_#D500F9] z-20 border-y border-r border-[#D500F9]' : 'z-10';

                html += `
                    <div class="absolute left-0 flex items-center justify-start group cursor-crosshair hover:z-50 ${pocStyle}" 
                         style="bottom: ${bottomPos}%; height: ${barHeightCss}; width: ${widthPct}%;"
                         onmouseenter="handleVolHover('${asset}', ${bin.price}, ${isPoc}, '${priceStr}', '${buyStr}', '${sellStr}', '${totalStr}')"
                         onmouseleave="handleVolLeave('${asset}')"
                         onclick="handleVolClick('${asset}', ${bin.price}, ${isPoc}, '${priceStr}', '${buyStr}', '${sellStr}', '${totalStr}')">
                        
                        <div class="h-full bg-[#22ab94] opacity-80 group-hover:opacity-100 group-hover:bg-white transition-all" style="width: ${buyWidthPct}%;"></div>
                        <div class="h-full bg-[#f23645] opacity-80 group-hover:opacity-100 group-hover:bg-white transition-all rounded-r-[2px]" style="width: ${sellWidthPct}%;"></div>
                    </div>
                `;
            });
            
            
            const deltaVol = totalBuy - totalSell;
            const deltaColor = deltaVol >= 0 ? 'text-[#22ab94]' : 'text-[#f23645]';
            html += `
                <div class="absolute top-3 left-1/2 transform -translate-x-1/2 flex gap-3 z-40 pointer-events-none">
                    <div class="bg-[#1e222d]/95 backdrop-blur-sm border border-[#2a2e39] px-3 py-1.5 rounded text-xs font-mono shadow-md text-white">
                        <span class="text-[#787b86] mr-1">VOL:</span>$${formatCompact(totalBuy + totalSell)}
                    </div>
                    <div class="bg-[#1e222d]/95 backdrop-blur-sm border border-[#2a2e39] px-3 py-1.5 rounded text-xs font-mono shadow-md text-white">
                        <span class="text-[#787b86] mr-1">Delta:</span><span class="${deltaColor} font-bold">${deltaVol > 0 ? '+' : ''}$${formatCompact(deltaVol)}</span>
                    </div>
                </div>
            `;

            container.innerHTML = html;
            
            
            window.renderVolTooltipDOM(asset);
        }

        
        if (!window.heatmapTooltipState) {
            window.heatmapTooltipState = { BTC: { id: null, pinned: false }, ETH: { id: null, pinned: false } };
            
            window.handleHmClick = function(asset, id) {
                const state = window.heatmapTooltipState[asset];
                if (state.pinned && state.id === id) {

                    state.id = null;
                } else {

                document.querySelectorAll(`.hm-tt-${asset}`).forEach(el => {

                        tt.classList.add('!block', 'border-[#FFD700]', 'z-[200]');
                        tt.insertAdjacentHTML('beforeend', '<div class="hm-pinned-text text-[9px] text-[#FFD700] mt-1.5 bg-[#FFD700]/10 py-0.5 rounded animate-pulse border border-[#FFD700]/30 text-center">📌 Pinned</div>');
                    }
                }
            };
        }

        function renderRealHeatmap(asset, heatmapData, currentPrice, liveObj) {
            const container = document.getElementById(`combined-heatmap-${asset}`);
            if(!container) return;

            const rangeMin = currentPrice * 0.95;
            const rangeMax = currentPrice * 1.05;

            let allItems = [];
            const numBins = asset === 'BTC' ? 100 : 45; 
            const binSize = (rangeMax - rangeMin) / numBins;
            let shortsBins = {}; let longsBins = {};
            
            let totalShortLiq = 0;
            let totalLongLiq = 0;

            if (heatmapData && heatmapData.shorts) {
                Object.entries(heatmapData.shorts).forEach(([p, v]) => {
                    let price = parseFloat(p); let vol = parseFloat(v);
                    totalShortLiq += vol;
                    if(price > currentPrice && price <= rangeMax) {
                        let binIdx = Math.floor((price - rangeMin) / binSize);
                        shortsBins[binIdx] = (shortsBins[binIdx] || 0) + vol;
                    }
                });
            }
            if (heatmapData && heatmapData.longs) {
                Object.entries(heatmapData.longs).forEach(([p, v]) => {
                    let price = parseFloat(p); let vol = parseFloat(v);
                    totalLongLiq += vol;
                    if(price >= rangeMin && price < currentPrice) {
                        let binIdx = Math.floor((price - rangeMin) / binSize);
                        longsBins[binIdx] = (longsBins[binIdx] || 0) + vol;
                    }
                });
            }

            for (let i = 0; i < numBins; i++) {
                let centerPrice = rangeMin + (i + 0.5) * binSize;
                if (shortsBins[i] > 0) allItems.push({ price: centerPrice, vol: shortsBins[i], color: 'bg-[#22ab94]', direction: 'up', type: 'Short Liq Cluster', isBin: true });
                if (longsBins[i] > 0) allItems.push({ price: centerPrice, vol: longsBins[i], color: 'bg-[#f23645]', direction: 'down', type: 'Long Liq Cluster', isBin: true });
            }

            if (liveObj) {
                ['close', 'mid', 'macro'].forEach(zone => {
                    let pAsk = liveObj[`whale_${zone}_ask_price`]; let vAsk = liveObj[`whale_${zone}_ask_vol`];
                    if (pAsk && pAsk >= rangeMin && pAsk <= rangeMax && vAsk >= 50000000) {
                        allItems.push({ price: pAsk, vol: vAsk, color: 'bg-[#f23645]', direction: 'down', type: 'Ask Wall', isWall: true });
                    }
                    
                    let pBid = liveObj[`whale_${zone}_bid_price`]; let vBid = liveObj[`whale_${zone}_bid_vol`];
                    if (pBid && pBid >= rangeMin && pBid <= rangeMax && vBid >= 50000000) {
                        allItems.push({ price: pBid, vol: vBid, color: 'bg-[#22ab94]', direction: 'up', type: 'Bid Wall', isWall: true });
                    }
                });
            }

            let combinedHtml = '';
            if (allItems.length > 0) {
                const maxVol = Math.max(...allItems.map(i => i.vol), 1);
                
                combinedHtml = `<div class="relative h-full min-h-[192px] sm:min-h-[256px] w-full mt-2 bg-[#0b0e14]/50 overflow-hidden shadow-inner border border-[#2a2e39] rounded flex-1">`;
                
                combinedHtml += `<div class="absolute top-1/2 left-0 w-full h-[1px] bg-[#787b86] opacity-30 z-0"></div>`;
                
                combinedHtml += `
                    <div class="absolute right-1 top-1 text-[9px] text-[#787b86] font-mono bg-[#0b0e14]/80 px-1 rounded border border-[#2a2e39] z-20">${formatCompact(maxVol)}</div>
                    <div class="absolute right-1 top-1/2 -translate-y-1/2 text-[9px] text-[#787b86] font-mono bg-[#0b0e14]/80 px-1 rounded border border-[#2a2e39] z-20">0</div>
                    <div class="absolute right-1 bottom-1 text-[9px] text-[#787b86] font-mono bg-[#0b0e14]/80 px-1 rounded border border-[#2a2e39] z-20">${formatCompact(maxVol)}</div>
                `;

                combinedHtml += `
                    <div class="absolute top-3 left-1/4 transform -translate-x-1/2 bg-[#1e222d]/90 backdrop-blur-sm border border-[#2a2e39] px-4 py-2 rounded-lg shadow-lg z-30 pointer-events-none text-center">
                        <span class="block text-[9px] text-[#787b86] font-bold mb-0.5 uppercase tracking-wider">LONG LIQ (Sum)</span>
                        <span class="text-sm font-bold text-[#f23645]">$${formatCompact(totalLongLiq)}</span>
                    </div>
                    <div class="absolute top-3 right-1/4 transform translate-x-1/2 bg-[#1e222d]/90 backdrop-blur-sm border border-[#2a2e39] px-4 py-2 rounded-lg shadow-lg z-30 pointer-events-none text-center">
                        <span class="block text-[9px] text-[#787b86] font-bold mb-0.5 uppercase tracking-wider">SHORT LIQ (Sum)</span>
                        <span class="text-sm font-bold text-[#22ab94]">$${formatCompact(totalShortLiq)}</span>
                    </div>
                `;

                const state = window.heatmapTooltipState[asset];

                allItems.forEach(item => {
                    const leftPct = ((item.price - rangeMin) / (rangeMax - rangeMin)) * 100;
                    const heightPct = Math.max(1, (item.vol / maxVol) * 45); 
                    const isUp = item.direction === 'up';
                    const positionCss = isUp ? `bottom: 50%; height: ${heightPct}%;` : `top: 50%; height: ${heightPct}%;`;
                    const shadowColor = item.color === 'bg-[#22ab94]' ? '#22ab94' : '#f23645';
                    const borderColor = item.color.replace('bg-', 'border-');
                    const textColor = item.color.replace('bg-', 'text-');
                    const roundedClass = isUp ? 'rounded-t-[2px]' : 'rounded-b-[2px]';
                    const tooltipPosition = isUp ? 'top-full mt-3' : 'bottom-full mb-3';
                    const flexAlign = isUp ? 'justify-end' : 'justify-start';

                    let tooltipHorizontalClass = "left-1/2 -translate-x-1/2";
                    if (leftPct < 20) tooltipHorizontalClass = "left-0 transform-none";
                    else if (leftPct > 80) tooltipHorizontalClass = "right-0 left-auto transform-none";
                    
                    let wallMarker = ''; let parentWidthStyle = ''; let fillClasses = '';
                    if (item.isWall) {
                        const wallShadow = item.color === 'bg-[#22ab94]' ? 'shadow-[0_0_20px_5px_#22ab94]' : 'shadow-[0_0_20px_5px_#f23645]';
                        wallMarker = isUp 
                            ? `<div class="absolute bottom-full mb-1 w-[32px] h-[22px] ${item.color} flex items-center justify-center text-white text-[12px] font-bold rounded-t shadow-xl ${wallShadow} z-20 border-x border-t border-white/50 animate-pulse">W</div>`
                            : `<div class="absolute top-full mt-1 w-[32px] h-[22px] ${item.color} flex items-center justify-center text-white text-[12px] font-bold rounded-b shadow-xl ${wallShadow} z-20 border-x border-b border-white/50 animate-pulse">W</div>`;
                        parentWidthStyle = `width: 32px;`; 
                        fillClasses = `${item.color} opacity-95 border-x border-white/30`;
                    } else { 
                        parentWidthStyle = `width: calc(${100 / numBins}% + 1px);`; 
                        fillClasses = `${item.color} opacity-80`;
                    }

                    const itemId = `${item.type.replace(/\s+/g, '_')}_${item.price}`;
                    const isPinned = state.pinned && state.id === itemId;
                    const isWall = item.isWall;
                    const wallBorderColor = item.color === 'bg-[#22ab94]' ? 'border-[#22ab94]' : 'border-[#f23645]';
                    
                    
                    let activeClasses = 'hidden group-hover:block border-[#2a2e39] z-[100]';
                    if (isPinned) {
                        activeClasses = '!block border-[#FFD700] z-[200]';
                    } else if (isWall) {
                        activeClasses = `!block ${wallBorderColor} z-[150]`;
                    }

                    const pinnedBadge = isPinned ? '<div class="hm-pinned-text text-[9px] text-[#FFD700] mt-1.5 bg-[#FFD700]/10 py-0.5 rounded animate-pulse border border-[#FFD700]/30 text-center">📌 Pinned</div>' : '';
                    const wallBadge = (isWall && !isPinned) ? `<div class="text-[9px] ${textColor} mt-1.5 bg-black/40 py-0.5 rounded border border-[#2a2e39] text-center uppercase animate-pulse">🔥 Active Wall</div>` : '';

                    combinedHtml += `
                        <div class="absolute flex flex-col items-center ${flexAlign} group cursor-crosshair hover:z-[60]" 
                             style="left: ${leftPct}%; transform: translateX(-50%); ${positionCss} z-10; ${parentWidthStyle}"
                             onclick="handleHmClick('${asset}', '${itemId}')">
                             
                            <div id="hm-tt-${asset}-${itemId}" 
                                 data-is-wall="${isWall}" 
                                 data-wall-border="${wallBorderColor}" 
                                 class="hm-tt-${asset} ${activeClasses} absolute ${tooltipPosition} ${tooltipHorizontalClass} bg-[#1e222d]/95 backdrop-blur-md border text-white text-[10px] p-2.5 rounded-lg whitespace-nowrap shadow-[0_0_20px_rgba(0,0,0,0.8)] transition-colors duration-200">
                                <span class="${textColor} font-bold text-xs uppercase tracking-wider">${item.type}</span><br>
                                <div class="my-1.5 h-[1px] bg-[#2a2e39] w-full"></div>
                                <div class="flex justify-between gap-4"><span class="text-[#787b86]">Price:</span> <span>${item.isBin ? '~' : ''}${formatMoney(item.price)}</span></div>
                                <div class="flex justify-between gap-4"><span class="text-[#787b86]">Volume:</span> <span class="${textColor} font-bold">$${formatCompact(item.vol)}</span></div>
                                ${pinnedBadge}
                                ${wallBadge}
                            </div>
                            ${wallMarker}
                            <div class="${fillClasses} group-hover:opacity-100 group-hover:bg-white transition-all ${roundedClass} shadow-[0_0_8px_${shadowColor}] h-full" style="width: 100%;"></div>
                        </div>`;
                });

                const currentLeftPct = ((currentPrice - rangeMin) / (rangeMax - rangeMin)) * 100;
                combinedHtml += `
                    <div class="absolute top-0 bottom-0 flex flex-col justify-center items-center group cursor-crosshair z-40 pointer-events-none" style="left: ${currentLeftPct}%; width: 20px; transform: translateX(-50%);">
                        <div class="w-[1px] h-full bg-[#FFD700] shadow-[0_0_10px_#FFD700] opacity-80"></div>
                        <div class="absolute w-[8px] h-[8px] rounded-full bg-[#FFD700] shadow-[0_0_15px_#FFD700]"></div>
                    </div>
                </div>`;

                combinedHtml += `
                <div class="relative flex justify-between text-[10px] text-[#787b86] font-mono mt-2 px-1 shrink-0">
                    <span class="text-[#f23645]">${formatMoney(rangeMin)} (-5%)</span>
                    <span class="absolute left-1/2 -translate-x-1/2 text-[#FFD700] font-bold">${formatMoney(currentPrice)}</span>
                    <span class="text-[#22ab94]">${formatMoney(rangeMax)} (+5%)</span>
                </div>`;
            } else {
                combinedHtml = '<div class="h-full min-h-[192px] flex items-center justify-center flex-1"><p class="text-[10px] text-[#787b86] italic animate-pulse">Accumulating Data...</p></div>';
            }
            container.innerHTML = combinedHtml;
        }

        function initAssetUI(asset) {

        function initCharts(asset) {

            const fundContainer = document.getElementById(`chart-fund-${asset}`);

            const chartConfig = {
                layout: { textColor: '#787b86', background: { type: 'solid', color: 'transparent' } },
                grid: { vertLines: { color: '#2a2e39', style: 1 }, horzLines: { color: '#2a2e39', style: 1 } },
                timeScale: { timeVisible: true, secondsVisible: false, borderColor: '#2a2e39' },
                rightPriceScale: { borderColor: '#2a2e39' },
                handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: false }
            };

            const customScale = { ...chartConfig, localization: { priceFormatter: formatCompact } };
            const fundScale = { ...chartConfig, localization: { priceFormatter: (p) => p.toFixed(4) + '%' } };
            const priceScale = { ...chartConfig, localization: { priceFormatter: (p) => p.toFixed(2) } };

            chartsData[asset] = { activeWhalePrices: [], whaleLines: {}, currentCandle: null, pocLine: null, zoomStates: {} };

            const candleChart = LightweightCharts.createChart(candleContainer, { ...priceScale });
            const candleSeries = candleChart.addCandlestickSeries({ 
                upColor: '#22ab94', downColor: '#f23645', borderVisible: false, wickUpColor: '#22ab94', wickDownColor: '#f23645',
                autoscaleInfoProvider: (original) => {
                    const res = original();
                    if (res && res.priceRange && chartsData[asset].activeWhalePrices.length > 0 && wallsVisible[asset] && !lineMode[asset]) {
                        let min = res.priceRange.minValue; let max = res.priceRange.maxValue;
                        chartsData[asset].activeWhalePrices.forEach(p => { if (p < min) min = p; if (p > max) max = p; });
                        const padding = (max - min) * 0.15;
                        res.priceRange.minValue = min - padding; res.priceRange.maxValue = max + padding;
                    }
                    return res;
                }
            });

            const simpleLineSeries = candleChart.addLineSeries({ color: '#ffffff', lineWidth: 2, visible: false });
            const ema50Series = candleChart.addLineSeries({ color: '#2962FF', lineWidth: 1, title: 'EMA 50', visible: false });
            const ema200Series = candleChart.addLineSeries({ color: '#f8a13f', lineWidth: 2, title: 'EMA 200', visible: false });
            const ema800Series = candleChart.addLineSeries({ color: '#FFD700', lineWidth: 2, title: 'EMA 800', visible: true });

            
            const liqChart = LightweightCharts.createChart(liqContainer, { ...customScale });

                    const allOI = {}; const allOIDelta = {}; const allFund = {}; const allCVD = {}; const allVol = {}; const allDiv = {};
                    
                    EXCHANGES.forEach(ex => {
                        allOI[ex] = []; allOIDelta[ex] = []; allFund[ex] = [];
                        allCVD[ex] = { '24H': [], 'ASIA': [], 'EU': [], 'US': [] };
                        allDiv[ex] = { '24H': [], 'ASIA': [], 'EU': [], 'US': [] };

                            '24H': { 'TOTAL': [], 'DELTA': [] }, 'ASIA': { 'TOTAL': [], 'DELTA': [] },
                            'EU': { 'TOTAL': [], 'DELTA': [] }, 'US': { 'TOTAL': [], 'DELTA': [] }
                        };
                    });

                    let prevCVD = {}; let prevOI = {};
                    EXCHANGES.forEach(ex => {
                        prevCVD[ex] = parseFloat(history[0][ex === 'GLOBAL' ? 'cvd' : `cvd_${ex.toLowerCase()}`]) || 0;
                        prevOI[ex] = parseFloat(history[0][ex === 'GLOBAL' ? 'open_interest' : `oi_${ex.toLowerCase()}`]) || 0;
                    });
                    let prevPrice = parseFloat(history[0].price) || 0;

                    history.forEach(p => {
                        if (!uniqueTimes.has(p.time)) {
                            let currentPrice = parseFloat(p.price);
                            let priceDelta = 0;
                            
                            if (!isNaN(currentPrice) && currentPrice > 0) {
                                tempPriceForEma.push({ time: p.time, value: currentPrice });
                                formattedPrice.push({ time: p.time, value: currentPrice });
                                priceDelta = currentPrice - prevPrice;
                                formattedCandles.push({ time: p.time, open: prevPrice, high: Math.max(prevPrice, currentPrice), low: Math.min(prevPrice, currentPrice), close: currentPrice });
                                prevPrice = currentPrice;
                            }
                            
                            EXCHANGES.forEach(ex => {
                                let oiKey = ex === 'GLOBAL' ? 'open_interest' : `oi_${ex.toLowerCase()}`;
                                let fundKey = ex === 'GLOBAL' ? 'funding_global' : `funding_${ex.toLowerCase()}`;
                                let cvdKey = ex === 'GLOBAL' ? 'cvd' : `cvd_${ex.toLowerCase()}`;
                                let volKey = ex === 'GLOBAL' ? 'volume' : `vol_${ex.toLowerCase()}`;
                                
                                let currentOI = parseFloat(p[oiKey]) || 0;
                                let oiDelta = currentOI - prevOI[ex];
                                allOI[ex].push({ time: p.time, value: currentOI });
                                allOIDelta[ex].push({ time: p.time, value: oiDelta, color: oiDelta >= 0 ? '#22ab94' : '#f23645' });
                                prevOI[ex] = currentOI;

                                if (p[fundKey] !== undefined) {
                                    let fVal = parseFloat(p[fundKey]) || 0;
                                    allFund[ex].push({ time: p.time, value: fVal, color: fVal >= 0 ? '#f8a13f' : '#2962FF' });
                                }
                                
                                let currentCVD = parseFloat(p[cvdKey]) || 0; 
                                let currentVol = Math.abs(parseFloat(p[volKey]) || 0); 
                                
                                allCVD[ex]['24H'].push({ time: p.time, value: currentCVD });
                                
                                const candleDelta = currentCVD - prevCVD[ex];
                                const barColor = candleDelta >= 0 ? '#22ab94' : '#f23645';
                                prevCVD[ex] = currentCVD;

                                allVol[ex]['24H']['TOTAL'].push({ time: p.time, value: currentVol, color: barColor });
                                allVol[ex]['24H']['DELTA'].push({ time: p.time, value: candleDelta, color: barColor });

                                let divColor = '';
                                if (candleDelta > 0 && priceDelta <= 0) divColor = '#FFD700'; 
                                else if (candleDelta < 0 && priceDelta >= 0) divColor = '#2962FF'; 
                                else if (candleDelta > 0 && priceDelta > 0) divColor = '#22ab94';  
                                else divColor = '#f23645'; 

                                allDiv[ex]['24H'].push({ time: p.time, value: candleDelta, color: divColor });
                            });

                            let lShort = parseFloat(p.liq_short) || 0; 
                            let lLong = parseFloat(p.liq_long) || 0;
                            let netLiq = lShort - lLong; 
                            formattedLiq.push({ time: p.time, value: netLiq, color: netLiq >= 0 ? '#22ab94' : '#f23645' });
                            formattedGrossShorts.push({ time: p.time, value: lShort, color: '#22ab94' });
                            formattedGrossLongs.push({ time: p.time, value: -lLong, color: '#f23645' }); 

                            uniqueTimes.add(p.time);
                        }
                    });

                    const now = new Date();
                    const getAnchorTime = (h, m) => {
                        let d = new Date(); d.setUTCHours(h, m, 0, 0);
                        if (d.getTime() > now.getTime()) d.setUTCDate(d.getUTCDate() - 1);
                        return Math.floor(d.getTime() / 1000);
                    };
                    const tsASIA = getAnchorTime(0, 0);
                    const tsEU = getAnchorTime(8, 0);
                    const tsUS = getAnchorTime(13, 30);

                    const cvdAnchors = {};
                    EXCHANGES.forEach(ex => {
                        cvdAnchors[ex] = { 'ASIA': {val: null, idx: 0}, 'EU': {val: null, idx: 0}, 'US': {val: null, idx: 0} };
                        
                        let idxASIA = allCVD[ex]['24H'].findIndex(p => p.time >= tsASIA);
                        let idxEU = allCVD[ex]['24H'].findIndex(p => p.time >= tsEU);
                        let idxUS = allCVD[ex]['24H'].findIndex(p => p.time >= tsUS);

                        if(idxASIA !== -1) { cvdAnchors[ex]['ASIA'].val = allCVD[ex]['24H'][idxASIA].value; cvdAnchors[ex]['ASIA'].idx = idxASIA; }
                        if(idxEU !== -1) { cvdAnchors[ex]['EU'].val = allCVD[ex]['24H'][idxEU].value; cvdAnchors[ex]['EU'].idx = idxEU; }
                        if(idxUS !== -1) { cvdAnchors[ex]['US'].val = allCVD[ex]['24H'][idxUS].value; cvdAnchors[ex]['US'].idx = idxUS; }

                        ['ASIA', 'EU', 'US'].forEach(s => {
                            if (cvdAnchors[ex][s].val === null) { cvdAnchors[ex][s].val = allCVD[ex]['24H'][0]?.value || 0; cvdAnchors[ex][s].idx = 0; }
                            const startIdx = cvdAnchors[ex][s].idx; const baseVal = cvdAnchors[ex][s].val;
                            allCVD[ex][s] = allCVD[ex]['24H'].slice(startIdx).map(p => ({ time: p.time, value: p.value - baseVal }));
                            allVol[ex][s]['TOTAL'] = allVol[ex]['24H']['TOTAL'].slice(startIdx);
                            allVol[ex][s]['DELTA'] = allVol[ex]['24H']['DELTA'].slice(startIdx);
                            allDiv[ex][s] = allDiv[ex]['24H'].slice(startIdx);
                        });
                    });

                    formattedCandles.sort((a, b) => a.time - b.time); 
                    formattedPrice.sort((a, b) => a.time - b.time); 
                    formattedLiq.sort((a, b) => a.time - b.time); 
                    formattedGrossShorts.sort((a, b) => a.time - b.time);
                    formattedGrossLongs.sort((a, b) => a.time - b.time);

                    if(formattedCandles.length > 0) {
                        let volumeProfile = {}; let maxVolume = 0; let pocPrice = 0;
                        const binSize = asset === 'BTC' ? 20 : 1; 
                        formattedCandles.forEach((c, idx) => {
                            let vol = allVol['GLOBAL']['24H']['TOTAL'][idx] ? Math.abs(allVol['GLOBAL']['24H']['TOTAL'][idx].value) : 0;
                            let typicalPrice = (c.high + c.low + c.close) / 3;
                            let bin = Math.round(typicalPrice / binSize) * binSize;
                            if(!volumeProfile[bin]) volumeProfile[bin] = 0;
                            volumeProfile[bin] += vol;
                            if(volumeProfile[bin] > maxVolume) { maxVolume = volumeProfile[bin]; pocPrice = bin; }
                        });
                        if(pocPrice > 0) {
                            if (chartsData[asset].pocLine) chartsData[asset].candleSeries.removePriceLine(chartsData[asset].pocLine);
                            chartsData[asset].pocLine = chartsData[asset].candleSeries.createPriceLine({ price: pocPrice, color: '#D500F9', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Solid, axisLabelVisible: true, title: 'POC (24H)' });
                        }
                    }

                    if(tempPriceForEma.length > 0) {
                        const emas = { '50': [], '200': [], '800': [] };
                        const k = { '50': 2/51, '200': 2/201, '800': 2/801 };
                        let seeds = { '50': 0, '200': 0, '800': 0 };
                        ['50', '200', '800'].forEach(period => {
                            let sum = 0; let count = Math.min(parseInt(period), tempPriceForEma.length);
                            for (let i = 0; i < count; i++) { sum += tempPriceForEma[i].value; }
                            seeds[period] = sum / count;
                        });
                        let currentEmas = { '50': seeds['50'], '200': seeds['200'], '800': seeds['800'] };
                        let markers = []; let prev50 = currentEmas['50']; let prev200 = currentEmas['200'];

                        history.forEach(p => {
                            let curP = parseFloat(p.price);
                            if (curP) {
                                ['50', '200', '800'].forEach(period => {
                                    if (p[`ema${period}`] !== undefined && p[`ema${period}`] !== null) currentEmas[period] = parseFloat(p[`ema${period}`]);
                                    else currentEmas[period] = (curP * k[period]) + (currentEmas[period] * (1 - k[period]));
                                    emas[period].push({ time: p.time, value: currentEmas[period] });
                                });
                                if (prev50 < prev200 && currentEmas['50'] >= currentEmas['200']) markers.push({ time: p.time, position: 'belowBar', color: '#22ab94', shape: 'arrowUp', text: '50x200 UP' });
                                else if (prev50 > prev200 && currentEmas['50'] <= currentEmas['200']) markers.push({ time: p.time, position: 'aboveBar', color: '#f23645', shape: 'arrowDown', text: '50x200 DOWN' });
                                prev50 = currentEmas['50']; prev200 = currentEmas['200'];
                            }
                        });
                        
                        chartsData[asset].candleSeries.setData(formattedCandles); 
                        chartsData[asset].simpleLineSeries.setData(formattedPrice);
                        chartsData[asset].emaSeries['50'].setData(emas['50']);
                        chartsData[asset].emaSeries['200'].setData(emas['200']);
                        chartsData[asset].emaSeries['800'].setData(emas['800']);
                        chartsData[asset].candleSeries.setMarkers(markers);
                        chartsData[asset].lastClosedEmas = { ...currentEmas };
                        chartsData[asset].crossState = { prev50: currentEmas['50'], prev200: currentEmas['200'] }; 
                    }

                    if(allCVD['GLOBAL']['24H'].length > 0) {
                        chartsData[asset].allOI = allOI; chartsData[asset].allOIDelta = allOIDelta; chartsData[asset].allCVD = allCVD; 
                        chartsData[asset].allVol = allVol; chartsData[asset].allDiv = allDiv; chartsData[asset].allFund = allFund; chartsData[asset].cvdAnchors = cvdAnchors;

                        if(allOI['GLOBAL'].length > 0) chartsData[asset].oiSeries.setData(allOI['GLOBAL']);
                        if(allOIDelta['GLOBAL'].length > 0) chartsData[asset].oiDeltaSeries.setData(allOIDelta['GLOBAL']);
                        chartsData[asset].cvdSeries.setData(allCVD['GLOBAL']['24H']);
                        chartsData[asset].volSeries.setData(allVol['GLOBAL']['24H']['TOTAL']);
                        chartsData[asset].divSeries.setData(allDiv['GLOBAL']['24H']);
                        
                        chartsData[asset].netLiqSeries.setData(formattedLiq); 
                        chartsData[asset].grossShortSeries.setData(formattedGrossShorts);
                        chartsData[asset].grossLongSeries.setData(formattedGrossLongs);

                        if(allFund['GLOBAL'].length > 0) chartsData[asset].fundSeries.setData(allFund['GLOBAL']); 
                        lastChartTime[asset] = allCVD['GLOBAL']['24H'][allCVD['GLOBAL']['24H'].length - 1].time;
                    }
                }
            } catch (e) { console.warn(`History fetch failed for ${asset}.`); }
        }

        function updateOBBar(asset, suffix, bids, asks, imb) {
            const total = bids + asks;
            if (total > 0) {
                const buyPct = (bids / total) * 100; const sellPct = 100 - buyPct;
                const barEl = document.getElementById(`${asset}-ob-bar-${suffix}`);
                if (barEl) barEl.style.width = `${buyPct}%`;
                
                if (suffix === '1h' || suffix === '24h') {
                    const bidsTxt = document.getElementById(`${asset}-bids-txt-${suffix}`); const asksTxt = document.getElementById(`${asset}-asks-txt-${suffix}`); const imbTxt = document.getElementById(`${asset}-imb-txt-${suffix}`);
                    if (bidsTxt) bidsTxt.textContent = `${buyPct.toFixed(1)}%`; if (asksTxt) asksTxt.textContent = `${sellPct.toFixed(1)}%`;
                    if (imbTxt) imbTxt.textContent = buyPct >= sellPct ? `BIDS LEAD: +${Math.abs(buyPct - sellPct).toFixed(1)}%` : `ASKS LEAD: ${Math.abs(buyPct - sellPct).toFixed(1)}%`;
                } else {
                    const bidsTxt = document.getElementById(`${asset}-bids-txt-${suffix}`); const asksTxt = document.getElementById(`${asset}-asks-txt-${suffix}`); const imbTxt = document.getElementById(`${asset}-imb-txt-${suffix}`);
                    if (bidsTxt) bidsTxt.textContent = formatMoney(bids); if (asksTxt) asksTxt.textContent = formatMoney(asks);
                    if (imbTxt) imbTxt.textContent = imb > 0 ? `BIDS LEAD: +${formatCompact(imb)}` : `ASKS LEAD: ${formatCompact(Math.abs(imb))}`;
                }
            }

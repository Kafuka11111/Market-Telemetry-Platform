                            pct1h = data[asset].price_change['1h_pct'] || 0; const p24 = data[asset].price_change['24h_pct'] || 0;
                            const el1 = document.getElementById(`${asset}-main-pct-1h`); const el24 = document.getElementById(`${asset}-main-pct-24h`);
                            if (el1) { el1.textContent = `1H: ${pct1h > 0 ? '+' : ''}${pct1h.toFixed(2)}%`; el1.className = `text-[10px] sm:text-[11px] font-bold ${pct1h >= 0 ? 'text-[#22ab94]' : 'text-[#f23645]'}`; }
                            if (el24) { el24.textContent = `24H: ${p24 > 0 ? '+' : ''}${p24.toFixed(2)}%`; el24.className = `text-[10px] sm:text-[11px] font-bold ${p24 >= 0 ? 'text-[#22ab94]' : 'text-[#f23645]'}`; }
                        }

                        const cvd1h = stats1h.cvd_usd || 0;
                        const trendEl = document.getElementById(`${asset}-trend-text`); const trendSub = document.getElementById(`${asset}-trend-sub`);
                        if (trendEl && trendSub) {
                            if (pct1h > 0 && cvd1h > 0) { trendEl.textContent = "STRONG BULL"; trendEl.className = "text-xl lg:text-2xl font-bold text-[#22ab94] uppercase tracking-widest"; trendSub.textContent = "Price ⬆ | Whales ⬆"; } 
                            else if (pct1h < 0 && cvd1h < 0) { trendEl.textContent = "STRONG BEAR"; trendEl.className = "text-xl lg:text-2xl font-bold text-[#f23645] uppercase tracking-widest"; trendSub.textContent = "Price ⬇ | Whales ⬇"; } 
                            else if (pct1h > 0 && cvd1h < 0) { trendEl.textContent = "WEAK BULL"; trendEl.className = "text-xl lg:text-2xl font-bold text-[#f8a13f] uppercase tracking-widest"; trendSub.textContent = "Price ⬆ | Whales ⬇"; } 
                            else if (pct1h < 0 && cvd1h > 0) { trendEl.textContent = "WEAK BEAR"; trendEl.className = "text-xl lg:text-2xl font-bold text-[#f8a13f] uppercase tracking-widest"; trendSub.textContent = "Price ⬇ | Whales ⬆"; } 
                            else { trendEl.textContent = "NEUTRAL"; trendEl.className = "text-xl lg:text-2xl font-bold text-[#787b86] uppercase tracking-widest"; trendSub.textContent = "Consolidating"; }
                        }

                        let rawFunding = live.global_funding_rate !== undefined ? live.global_funding_rate : live.funding_rate;
                        if (rawFunding !== undefined && rawFunding !== null) {
                            rawFunding = parseFloat(rawFunding); 
                            if (!isNaN(rawFunding)) {
                                const fEl = document.getElementById(`${asset}-funding`);
                                if (fEl) { fEl.textContent = `${rawFunding.toFixed(4)}%`; fEl.className = `text-2xl lg:text-3xl font-bold ${rawFunding > 0 ? 'text-[#f8a13f]' : 'text-[#2962FF]'}`; }

                                let fgValue = 50; let fundScore = (rawFunding / 0.05) * 15; fgValue += Math.max(-15, Math.min(15, fundScore));
                                let currentCvd = stats1h.cvd_usd || 0; let cvdThreshold = asset.includes("BTC") ? 250000000 : 120000000; 
                                let cvdScore = (currentCvd / cvdThreshold) * 20; fgValue += Math.max(-20, Math.min(20, cvdScore));
                                let liqL = stats1h.liq_long_usd || 0; let liqS = stats1h.liq_short_usd || 0; let totalLiq = liqL + liqS;
                                if (totalLiq > 200000) { let liqSkew = (liqS - liqL) / totalLiq; fgValue += liqSkew * 10; }
                                let imb = live.ob_imbalance_usd || 0; let imbThreshold = asset.includes("BTC") ? 30000000 : 15000000;
                                let imbScore = (imb / imbThreshold) * 5; fgValue += Math.max(-5, Math.min(5, imbScore));

                                fgValue = Math.max(0, Math.min(100, fgValue)); 
                                const fgPointer = document.getElementById(`${asset}-fg-pointer`); if (fgPointer) fgPointer.style.left = `${fgValue}%`;
                                
                                let fgStatus = "Neutral";
                                if(fgValue >= 80) fgStatus = "Extreme Greed"; else if(fgValue >= 60) fgStatus = "Greed";
                                else if(fgValue <= 20) fgStatus = "Extreme Fear"; else if(fgValue <= 40) fgStatus = "Fear";
                                const fgText = document.getElementById(`${asset}-fg-text`);
                                if (fgText) fgText.textContent = `Index: ${Math.round(fgValue)} / 100 (${fgStatus})`;
                            }
                        }

                        if (live.global_open_interest !== undefined && live.price) {
                            const oiUsd = live.global_open_interest * live.price;
                            const oiValEl = document.getElementById(`${asset}-oi-val`); if (oiValEl) oiValEl.textContent = "$" + formatCompact(oiUsd);
                            const oiPct = data[asset].oi_change_1h || 0; const oiEl = document.getElementById(`${asset}-oi-pct`);
                            if (oiEl) { oiEl.textContent = `1H: ${oiPct > 0 ? '+' : ''}${oiPct.toFixed(2)}%`; oiEl.className = `text-[10px] font-bold mt-1 ${oiPct >= 0 ? 'text-[#22ab94]' : 'text-[#f23645]'}`; }
                        }

                        const currentMinute = Math.floor(Date.now() / 60000) * 60; 
                        
                        if (stats1h.cvd_usd !== undefined) {
                            let currentCandleOpen = chartsData[asset].currentCandle ? chartsData[asset].currentCandle.open : live.price;
                            let currentPriceDelta = live.price - currentCandleOpen;

                            chartsData[asset].simpleLineSeries.update({ time: currentMinute, value: live.price });

                            if (chartsData[asset].lastClosedEmas) {
                                const liveEmas = {};
                                ['50', '200', '800'].forEach(period => {
                                    const kp = 2 / (parseInt(period) + 1);
                                    if (chartsData[asset].currentCandle && chartsData[asset].currentCandle.time !== currentMinute) {
                                        const lastClosePrice = chartsData[asset].currentCandle.close;
                                        chartsData[asset].lastClosedEmas[period] = (lastClosePrice * kp) + (chartsData[asset].lastClosedEmas[period] * (1 - kp));
                                    }
                                    liveEmas[period] = (live.price * kp) + (chartsData[asset].lastClosedEmas[period] * (1 - kp));
                                    chartsData[asset].emaSeries[period].update({ time: currentMinute, value: liveEmas[period] });
                                });
                            }

                            let candle = chartsData[asset].currentCandle;
                            if (!candle || candle.time !== currentMinute) { candle = { time: currentMinute, open: live.price, high: live.price, low: live.price, close: live.price }; } 
                            else { candle.high = Math.max(candle.high, live.price); candle.low = Math.min(candle.low, live.price); candle.close = live.price; }
                            chartsData[asset].currentCandle = candle; chartsData[asset].candleSeries.update(candle);

                            EXCHANGES.forEach(ex => {
                                let exValOI = (ex === 'GLOBAL') ? (live.global_open_interest * live.price) : ((live[ex === 'BINANCE' ? 'open_interest' : `${ex.toLowerCase()}_open_interest`] || 0) * live.price);
                                if (isNaN(exValOI) || exValOI === undefined) exValOI = 0;
                                
                                let arrOI = chartsData[asset].allOI[ex];
                                let arrOIDelta = chartsData[asset].allOIDelta[ex];

                                if (arrOI && arrOI.length > 0) {
                                    let prevMinuteOI = arrOI.length > 1 ? arrOI[arrOI.length - 2].value : arrOI[0].value;
                                    if (arrOI[arrOI.length - 1].time === currentMinute) { arrOI[arrOI.length - 1].value = exValOI; } 
                                    else { prevMinuteOI = arrOI[arrOI.length - 1].value; arrOI.push({ time: currentMinute, value: exValOI }); }

                                    let oiDeltaVal = exValOI - prevMinuteOI;
                                    let oiColor = oiDeltaVal >= 0 ? '#22ab94' : '#f23645';

                                    if (arrOIDelta && arrOIDelta.length > 0) {
                                        let deltaItem = { time: currentMinute, value: oiDeltaVal, color: oiColor };
                                        if (arrOIDelta[arrOIDelta.length - 1].time === currentMinute) { arrOIDelta[arrOIDelta.length - 1] = deltaItem; } 
                                        else { arrOIDelta.push(deltaItem); }
                                        if (ex === activeGlobalExchange) chartsData[asset].oiDeltaSeries.update(deltaItem);
                                    }
                                    if (ex === activeGlobalExchange) chartsData[asset].oiSeries.update({ time: currentMinute, value: exValOI });
                                }

                                let currentWsCVD = ex === 'GLOBAL' ? stats1h.cvd_usd : (data[asset].last_1h[`cvd_${ex.toLowerCase()}`] || 0);
                                let arrCVD = chartsData[asset].allCVD[ex]['24H'];
                                let arrDiv = chartsData[asset].allDiv[ex];

                                if (arrCVD && arrCVD.length > 0) {
                                    let prevMinuteCVD = arrCVD.length > 1 ? arrCVD[arrCVD.length - 2].value : arrCVD[0].value;
                                    
                                    if (arrCVD[arrCVD.length - 1].time === currentMinute) {
                                        arrCVD[arrCVD.length - 1].value = currentWsCVD;
                                    } else {
                                        prevMinuteCVD = arrCVD[arrCVD.length - 1].value;
                                        arrCVD.push({ time: currentMinute, value: currentWsCVD });
                                    }

                                    let cvdDelta = currentWsCVD - prevMinuteCVD;
                                    let divColor = '';
                                    if (cvdDelta > 0 && currentPriceDelta <= 0) divColor = '#FFD700'; 
                                    else if (cvdDelta < 0 && currentPriceDelta >= 0) divColor = '#2962FF'; 
                                    else if (cvdDelta > 0 && currentPriceDelta > 0) divColor = '#22ab94'; 
                                    else if (cvdDelta < 0 && currentPriceDelta < 0) divColor = '#f23645'; 
                                    else divColor = '#787b86';

                                    let divItem = { time: currentMinute, value: cvdDelta, color: divColor };

                                    ['24H', 'ASIA', 'EU', 'US'].forEach(ses => {
                                        if (arrDiv[ses] && arrDiv[ses].length > 0) {
                                            if (arrDiv[ses][arrDiv[ses].length - 1].time === currentMinute) arrDiv[ses][arrDiv[ses].length - 1] = divItem;
                                            else arrDiv[ses].push(divItem);
                                        }
                                    });

                                    if (ex === activeGlobalExchange) chartsData[asset].divSeries.update(divItem);
                                }
                            });

                            if (chartsData[asset].allFund) {
                                const fundMap = { 'GLOBAL': live.global_funding_rate !== undefined ? parseFloat(live.global_funding_rate) : 0 };
                                EXCHANGES.filter(e => e !== 'GLOBAL').forEach(ex => fundMap[ex] = live[ex === 'BINANCE' ? 'funding_rate' : `${ex.toLowerCase()}_funding_rate`] !== undefined ? parseFloat(live[ex === 'BINANCE' ? 'funding_rate' : `${ex.toLowerCase()}_funding_rate`]) : 0);
                                let fVal = fundMap[activeGlobalExchange]; if (fVal === undefined || isNaN(fVal)) fVal = fundMap['GLOBAL'];
                                chartsData[asset].fundSeries.update({ time: currentMinute, value: fVal, color: fVal >= 0 ? '#f8a13f' : '#2962FF' });
                                
                                EXCHANGES.forEach(ex => {
                                    let exVal = fundMap[ex]; if (exVal === undefined || isNaN(exVal)) exVal = fundMap['GLOBAL'];
                                    let arr = chartsData[asset].allFund[ex];
                                    if (arr && arr.length > 0) {
                                        let lastObj = arr[arr.length - 1];
                                        if (lastObj.time === currentMinute) { lastObj.value = exVal; lastObj.color = exVal >= 0 ? '#f8a13f' : '#2962FF'; } 
                                        else { arr.push({ time: currentMinute, value: exVal, color: exVal >= 0 ? '#f8a13f' : '#2962FF' }); }
                                    }
                                });
                            }

                            let liveLShort = stats1h.liq_short_usd || 0; let liveLLong = stats1h.liq_long_usd || 0; let liveNetLiq = liveLShort - liveLLong;
                            chartsData[asset].netLiqSeries.update({ time: currentMinute, value: liveNetLiq, color: liveNetLiq >= 0 ? '#22ab94' : '#f23645' });
                            chartsData[asset].grossShortSeries.update({ time: currentMinute, value: liveLShort, color: '#22ab94' });
                            chartsData[asset].grossLongSeries.update({ time: currentMinute, value: -liveLLong, color: '#f23645' });

                            const currentWsCVD = activeGlobalExchange === 'GLOBAL' ? stats1h.cvd_usd : (data[asset].last_1h[`cvd_${activeGlobalExchange.toLowerCase()}`] || 0);
                            const currentWsVol = activeGlobalExchange === 'GLOBAL' ? stats1h.total_volume_usd : (data[asset].last_1h[`vol_${activeGlobalExchange.toLowerCase()}`] || 0);
                            
                            if (chartsData[asset].cvdAnchors) {
                                const anchorVal = activeCVDSession === '24H' ? 0 : (chartsData[asset].cvdAnchors[activeGlobalExchange][activeCVDSession].val || 0);
                                chartsData[asset].cvdSeries.update({ time: currentMinute, value: currentWsCVD - anchorVal });
                            }

                            let activeArrCVD = chartsData[asset].allCVD[activeGlobalExchange]['24H'];
                            let prevMinCVD = activeArrCVD.length > 1 ? activeArrCVD[activeArrCVD.length - 2].value : 0;
                            let realMinuteDelta = currentWsCVD - prevMinCVD;

                            const barColor = realMinuteDelta >= 0 ? '#22ab94' : '#f23645';
                            const finalVolVal = activeVolMode === 'TOTAL' ? currentWsVol : Math.abs(realMinuteDelta);
                            
                            chartsData[asset].volSeries.update({ time: currentMinute, value: finalVolVal, color: barColor });

                            let volArrTotal = chartsData[asset].allVol[activeGlobalExchange]['24H']['TOTAL'];
                            let volArrDelta = chartsData[asset].allVol[activeGlobalExchange]['24H']['DELTA'];
                            if (volArrTotal && volArrTotal.length > 0) {
                                if (volArrTotal[volArrTotal.length - 1].time === currentMinute) {
                                    volArrTotal[volArrTotal.length - 1] = { time: currentMinute, value: currentWsVol, color: barColor };
                                    volArrDelta[volArrDelta.length - 1] = { time: currentMinute, value: realMinuteDelta, color: barColor };
                                } else {
                                    volArrTotal.push({ time: currentMinute, value: currentWsVol, color: barColor });
                                    volArrDelta.push({ time: currentMinute, value: realMinuteDelta, color: barColor });
                                }
                            }

                            lastWsCVD[asset] = currentWsCVD; lastChartTime[asset] = currentMinute;
                        }
                    });
                } catch (e) { console.error("Parse Error", e); }
            };

            activeWS.onclose = (e) => {
                if (e.code === 1008) return; reconnectAttempts++; if (reconnectAttempts > MAX_RECONNECT_ATTEMPTS) return;
                let delay = Math.floor(Math.min(30000, Math.pow(1.5, reconnectAttempts) * 1000) + Math.random() * 1000);
                reconnectTimeout = setTimeout(() => { connectWebSocket(key); }, delay);
            };
            activeWS.onerror = (err) => { activeWS.close(); };
        }

        function addTapePrint(asset, price, size, side, exchange) {
            if(asset !== currentAsset || !price || size < minTapeValue) return;
            const tape = document.getElementById('live-tape'); const isBuy = side === "BUY"; const row = document.createElement('div');
            const bgClass = size >= 1000000 ? (isBuy ? 'bg-[#22ab94]/40' : 'bg-[#f23645]/40') : (isBuy ? 'bg-[#22ab94]/20' : 'bg-[#f23645]/20');
            row.className = `tape-row flex items-center justify-between p-1.5 rounded border-l-2 ${isBuy ? 'border-[#22ab94]' : 'border-[#f23645]'} ${bgClass}`;
            row.innerHTML = `<span class="text-[9px] ${isBuy ? 'text-[#22ab94]' : 'text-[#f23645]'} font-bold w-10">${side}</span> <span class="${isBuy ? 'text-[#22ab94]' : 'text-[#f23645]'} text-[10px] sm:text-xs">${formatMoney(price)}</span><span class="text-white font-bold text-[10px] sm:text-xs">${formatCompact(size)}</span>`;
            tape.prepend(row); if(tape.children.length > 50) tape.lastChild.remove();
        }
